# Run from Actions → Release and publish to npm → Run workflow
# (choose patch / minor / major). Pushes version commit + tag, publishes to npm, opens a GitHub Release.
#
# Publishing uses npm Trusted Publishing (OIDC). Configure the package on npmjs.com with this exact
# workflow file name and GitHub org/repo. No NPM_TOKEN secret.
# If you set an "Environment" on the trusted publisher in npm, add the same to the job: environment: <name>
name: Release and publish to npm

on:
    workflow_dispatch:
        inputs:
            bump:
                description: 'Semver bump for package.json (before build + npm publish)'
                required: true
                type: choice
                default: patch
                options:
                    - patch
                    - minor
                    - major

concurrency:
    group: release-${{ github.repository }}
    cancel-in-progress: false

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.repository.default_branch }}
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Configure Git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Bump version (commit + tag)
              run: |
                  set -e
                  npm version "${{ inputs.bump }}" --no-git-tag
                  pnpm install
                  git add package.json pnpm-lock.yaml
                  VER=$(node -p "require('./package.json').version")
                  git commit -m "chore(release): v${VER}"
                  git tag -a "v${VER}" -m "v${VER}"

            - name: Build
              run: pnpm run build

            - name: Push branch and tags
              # Push to GitHub before npm so the release exists in git; publish to npm is last
              run: git push origin "HEAD:${{ github.event.repository.default_branch }}" && git push --tags

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  VER=$(node -p "require('./package.json').version")
                  gh release create "v$VER" --title "v$VER" --generate-notes

            # OIDC is implemented in the npm CLI. Use `npm publish` (not pnpm) so the upgraded npm is used.
            - name: Upgrade npm for OIDC publish
              run: npm install -g npm@^11.5.1

            - name: Publish to npm
              run: npm publish --access public
              env:
                  NPM_CONFIG_PROVENANCE: 'true'
